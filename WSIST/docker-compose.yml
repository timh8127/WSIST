services:
  mysql:
    image: mysql:8.0
    container_name: wsist-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: wsistdb
    ports:
      - "3306:3306"
    volumes:
      - wsist-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  wsist-mysql-data:
