apiVersion: apps/v1
kind: Deployment
metadata:
  name: wsist-app
  namespace: wsist
  annotations:
    keel.sh/policy: force
    keel.sh/trigger: poll
    keel.sh/pollSchedule: "@every 1m"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wsist-app
  template:
    metadata:
      labels:
        app: wsist-app
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1654
        runAsGroup: 1654
        fsGroup: 1654
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: wsist-app
          image: ghcr.io/timh8127/wsist:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: ASPNETCORE_URLS
              value: http://+:8080
            - name: Google__ClientId
              valueFrom:
                secretKeyRef:
                  name: wsist-app-secret
                  key: Google__ClientId
            - name: Google__ClientSecret
              valueFrom:
                secretKeyRef:
                  name: wsist-app-secret
                  key: Google__ClientSecret
            - name: Admin__Email
              valueFrom:
                secretKeyRef:
                  name: wsist-app-secret
                  key: Admin__Email
            - name: ConnectionStrings__DatabaseConnection
              valueFrom:
                secretKeyRef:
                  name: wsist-app-secret
                  key: ConnectionStrings__DatabaseConnection
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /login-page
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /login-page
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: wsist-app
  namespace: wsist
spec:
  selector:
    app: wsist-app
  ports:
    - port: 8080
      targetPort: 8080
