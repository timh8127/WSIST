apiVersion: apps/v1
kind: Deployment
metadata:
  name: wsist-cloudflared
  namespace: wsist
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wsist-cloudflared
  template:
    metadata:
      labels:
        app: wsist-cloudflared
    spec:
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:latest
          args:
            - tunnel
            - --no-autoupdate
            - run
            - --token
            - $(TUNNEL_TOKEN)
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflared-secret
                  key: TUNNEL_TOKEN
